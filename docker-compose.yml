version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: sync-manager-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/sql:/docker-entrypoint-initdb.d  # 首次启动自动执行 SQL
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sync-manager-redis
    restart: always
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: sync-manager-backend:latest
    container_name: sync-manager-backend
    restart: always
    ports:
      - "${BACKEND_PORT}:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      SYNC_LOCAL_STORAGE_PATH: ${STORAGE_PATH}
      SYNC_TEST_ENABLED: ${TEST_ENABLED}
      SYNC_TEST_MAX_FILES: ${TEST_MAX_FILES}
      SYNC_DISK_WARNING_THRESHOLD: ${DISK_WARNING_THRESHOLD}
      SYNC_DISK_SEVERE_THRESHOLD: ${DISK_SEVERE_THRESHOLD}
      SYNC_DISK_STOP_THRESHOLD: ${DISK_STOP_THRESHOLD}
      SPRING_PROFILES_ACTIVE: prod
    volumes:
      - files_data:/data/file-sync
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend-vue3ts
      dockerfile: Dockerfile
    image: sync-manager-frontend:latest
    container_name: sync-manager-frontend
    restart: always
    ports:
      - "${FRONTEND_PORT}:80"
    volumes:
      - ./frontend-vue3ts/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  mysql_data:
  redis_data:
  files_data:
